<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#0D7C66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Trisya_Bayar - Bayar Tagihan & Pulsa</title>

    <!-- ===== CDN ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>" />

    <style>
        /* ============================================
           CSS VARIABLES - TEMA HIJAU/TEAL
           ============================================ */
        :root {
            --primary: #0D7C66;
            --primary-dark: #0A5C4A;
            --primary-light: #15A884;
            --primary-gradient: linear-gradient(135deg, #0D7C66 0%, #00B4A0 100%);
            --secondary: #00B4A0;
            --secondary-light: #6CD4C4;
            --accent: #F5A623;
            --success: #27AE60;
            --danger: #E74C3C;
            --warning: #F39C12;
            --bg-primary: #F0F7F4;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --text-primary: #1A2A3A;
            --text-secondary: #4A5A6A;
            --text-light: #FFFFFF;
            --text-muted: #8A9AAA;
            --shadow-sm: 0 2px 8px rgba(13, 124, 102, 0.08);
            --shadow-md: 0 8px 30px rgba(13, 124, 102, 0.12);
            --shadow-lg: 0 16px 48px rgba(13, 124, 102, 0.18);
            --shadow-xl: 0 24px 64px rgba(13, 124, 102, 0.25);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-size-base: 16px;
        }

        [data-theme="dark"] {
            --bg-primary: #0D1A1A;
            --bg-secondary: #1A2A2A;
            --bg-card: #1A2A2A;
            --text-primary: #E8F0F0;
            --text-secondary: #A0B4B4;
            --text-muted: #6A7A7A;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: var(--font-size-base);
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 80px;
            transition: var(--transition);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: var(--radius-full);
        }

        /* ============================================
           HEADER - Mobile Optimized
           ============================================ */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-card);
            border-bottom: 1px solid rgba(13, 124, 102, 0.08);
            padding: 8px 12px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo-icon {
            font-size: 1.2rem;
        }
        .logo-text {
            font-size: 0.85rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .header-saldo {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--primary-gradient);
            color: var(--text-light);
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.6rem;
            white-space: nowrap;
        }
        .header-saldo i {
            font-size: 0.6rem;
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-size: 0.9rem;
            min-width: 40px;
            min-height: 40px;
            flex-shrink: 0;
        }
        .theme-toggle:active {
            transform: scale(0.92);
        }

        .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--primary-light);
            overflow: hidden;
            cursor: pointer;
            padding: 0;
            background: transparent;
            transition: var(--transition);
            min-width: 40px;
            min-height: 40px;
            flex-shrink: 0;
        }
        .profile-btn:active {
            transform: scale(0.92);
        }
        .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ============================================
           MAIN CONTENT - Mobile First
           ============================================ */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 12px;
            min-height: calc(100vh - 140px);
            transition: var(--transition);
        }

        /* ============================================
           BOTTOM NAV - Mobile Optimized
           ============================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bg-card);
            border-top: 1px solid rgba(13, 124, 102, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 0 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: var(--transition);
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            transition: var(--transition);
            position: relative;
            font-family: var(--font-family);
            min-height: 40px;
            min-width: 40px;
            border-radius: var(--radius-md);
            flex: 1;
        }
        .nav-item i {
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .nav-item::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--primary-gradient);
            border-radius: 0 0 var(--radius-full) var(--radius-full);
            transition: var(--transition);
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item.active::after {
            width: 50%;
        }
        .nav-item.active i {
            transform: translateY(-1px);
        }
        .nav-item:active {
            transform: scale(0.92);
        }

        /* ============================================
           SECTION
           ============================================ */
        .section {
            display: none;
            animation: fadeSlideUp 0.35s ease forwards;
        }
        .section.active {
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           CARDS - Mobile Optimized
           ============================================ */
        .card-modern {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(13, 124, 102, 0.06);
            transition: var(--transition);
            margin-bottom: 12px;
        }
        .card-modern .card-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* ============================================
           SALDO CARD - Mobile Hero
           ============================================ */
        .saldo-card {
            background: var(--primary-gradient);
            border-radius: var(--radius-lg);
            padding: 18px 16px;
            color: var(--text-light);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }
        .saldo-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }
        .saldo-card::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
        }
        .saldo-card .saldo-label {
            font-size: 0.7rem;
            opacity: 0.8;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .saldo-card .saldo-amount {
            font-size: 1.6rem;
            font-weight: 800;
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
            word-break: break-word;
        }
        .saldo-card .saldo-user {
            font-size: 0.75rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            margin-top: 2px;
        }

        /* ============================================
           QUICK ACCESS - Mobile Grid
           ============================================ */
        .quick-access {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 14px;
        }
        .quick-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: var(--bg-card);
            padding: 10px 4px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(13, 124, 102, 0.06);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-primary);
            min-height: 64px;
            box-shadow: var(--shadow-sm);
        }
        .quick-item:active {
            transform: scale(0.95);
        }
        .quick-item .icon-wrap {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .quick-item .icon-wrap.green {
            background: var(--primary-gradient);
        }
        .quick-item .icon-wrap.teal {
            background: linear-gradient(135deg, #00B4A0, #008A7A);
        }
        .quick-item .icon-wrap.gold {
            background: linear-gradient(135deg, #F5A623, #F39C12);
        }
        .quick-item .icon-wrap.purple {
            background: linear-gradient(135deg, #6C2BD9, #9B59B6);
        }
        .quick-item .quick-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-secondary);
            line-height: 1.2;
        }

        /* ============================================
           PROMO BANNER
           ============================================ */
        .promo-banner {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 14px;
            border: 1px solid rgba(13, 124, 102, 0.06);
            transition: var(--transition);
        }
        .promo-banner .promo-content {
            padding: 12px 14px;
            background: var(--primary-gradient);
            color: var(--text-light);
        }
        .promo-banner .promo-title {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 1px;
        }
        .promo-banner .promo-desc {
            font-size: 0.7rem;
            opacity: 0.9;
        }
        .promo-banner .promo-content+.promo-content {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ============================================
           FORM - Mobile Optimized
           ============================================ */
        .form-modern .form-label {
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }
        .form-modern .form-control {
            border: 2px solid rgba(13, 124, 102, 0.12);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-size: 0.95rem;
            transition: var(--transition);
            background: var(--bg-primary);
            color: var(--text-primary);
            width: 100%;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-modern .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 124, 102, 0.12);
            background: var(--bg-card);
            outline: none;
        }
        .form-modern .form-control.is-invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
        }
        .form-modern .invalid-feedback {
            color: var(--danger);
            font-size: 0.65rem;
            margin-top: 3px;
        }

        /* ============================================
           BUTTONS - Mobile Optimized (min 44px)
           ============================================ */
        .btn-primary-custom {
            background: var(--primary-gradient);
            border: none;
            color: var(--text-light);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            cursor: pointer;
            width: 100%;
            font-family: var(--font-family);
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary-custom:active {
            transform: scale(0.97);
        }
        .btn-primary-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary-custom {
            background: var(--bg-primary);
            border: 2px solid rgba(13, 124, 102, 0.12);
            color: var(--text-secondary);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            cursor: pointer;
            width: 100%;
            font-family: var(--font-family);
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary-custom:active {
            transform: scale(0.97);
        }

        .btn-danger-custom {
            background: var(--danger);
            border: none;
            color: var(--text-light);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            cursor: pointer;
            font-family: var(--font-family);
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-danger-custom:active {
            transform: scale(0.97);
        }

        /* ============================================
           PROVIDER GRID - Mobile
           ============================================ */
        .provider-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .provider-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: var(--bg-card);
            padding: 10px 4px;
            border-radius: var(--radius-md);
            border: 2px solid rgba(13, 124, 102, 0.06);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
            min-height: 56px;
            box-shadow: var(--shadow-sm);
        }
        .provider-item:active {
            transform: scale(0.95);
        }
        .provider-item.selected {
            border-color: var(--primary);
            background: rgba(13, 124, 102, 0.06);
        }
        .provider-item .provider-icon {
            font-size: 1.2rem;
        }
        .provider-item .provider-name {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* ============================================
           NOMINAL GRID - Mobile
           ============================================ */
        .nominal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .nominal-item {
            background: var(--bg-card);
            padding: 8px 4px;
            border-radius: var(--radius-md);
            border: 2px solid rgba(13, 124, 102, 0.06);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
            min-height: 48px;
            box-shadow: var(--shadow-sm);
        }
        .nominal-item:active {
            transform: scale(0.95);
        }
        .nominal-item.selected {
            border-color: var(--primary);
            background: rgba(13, 124, 102, 0.06);
        }
        .nominal-item .nominal-value {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .nominal-item .nominal-price {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        /* ============================================
           PAYMENT METHODS - Mobile
           ============================================ */
        .payment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 12px;
        }
        .payment-item {
            background: var(--bg-card);
            padding: 10px 4px;
            border-radius: var(--radius-md);
            border: 2px solid rgba(13, 124, 102, 0.06);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-family);
            min-height: 56px;
            box-shadow: var(--shadow-sm);
        }
        .payment-item:active {
            transform: scale(0.95);
        }
        .payment-item.selected {
            border-color: var(--primary);
            background: rgba(13, 124, 102, 0.06);
        }
        .payment-item .payment-icon {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 1px;
        }
        .payment-item .payment-name {
            font-size: 0.55rem;
            font-weight: 600;
        }

        /* ============================================
           SPP LIST - Mobile
           ============================================ */
        .spp-list .spp-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 4px;
            border-bottom: 1px solid rgba(13, 124, 102, 0.06);
            transition: var(--transition);
        }
        .spp-list .spp-item:active {
            background: rgba(13, 124, 102, 0.03);
        }
        .spp-list .spp-item .spp-check {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
            min-width: 20px;
        }
        .spp-list .spp-item .spp-info {
            flex: 1;
            min-width: 0;
        }
        .spp-list .spp-item .spp-desc {
            font-size: 0.75rem;
            font-weight: 500;
        }
        .spp-list .spp-item .spp-amount {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
            flex-shrink: 0;
            margin-left: 4px;
        }
        .spp-list .spp-item .spp-status {
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: var(--radius-full);
            font-weight: 600;
            flex-shrink: 0;
        }
        .spp-list .spp-item .spp-status.lunas {
            background: rgba(39, 174, 96, 0.12);
            color: var(--success);
        }
        .spp-list .spp-item .spp-status.belum {
            background: rgba(231, 76, 60, 0.12);
            color: var(--danger);
        }

        /* ============================================
           TOAST - Mobile
           ============================================ */
        .toast-container {
            position: fixed;
            top: 68px;
            right: 8px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 320px;
            width: calc(100% - 16px);
        }
        .toast-custom {
            background: var(--bg-card);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideInRight 0.35s ease forwards;
            border-left: 4px solid var(--primary);
            font-size: 0.8rem;
        }
        .toast-custom.hide {
            animation: slideOutRight 0.3s ease forwards;
        }
        .toast-custom.success {
            border-left-color: var(--success);
        }
        .toast-custom.error {
            border-left-color: var(--danger);
        }
        .toast-custom.warning {
            border-left-color: var(--warning);
        }
        .toast-custom .toast-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }
        .toast-custom .toast-message {
            flex: 1;
            font-weight: 500;
            font-size: 0.75rem;

        function formatRupiah(amount) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(amount);
        }

        function generateTransactionId() {
            const date = new Date();
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const random = String(Math.floor(Math.random() * 1000)).padStart(3, '0');
            return `TRX-${year}${month}${day}-${random}`;
        }

        function generateVA(bank) {
            const prefix = { 'BCA': '8860', 'BNI': '8800', 'Mandiri': '8850', 'BRI': '8880', 'BTN': '8870' };
            const random = String(Math.floor(Math.random() * 10000000000)).padStart(10, '0');
            return (prefix[bank] || '8800') + random;
        }

        function generatePaymentCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 12; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function getProviderByPhone(phone) {
            if (!phone || phone.length < 4) return null;
            const prefix = phone.substring(0, 4);
            for (const provider of providerData) {
                if (provider.prefix.includes(prefix)) {
                    return provider;
                }
            }
            return null;
        }

        function formatDate(dateString, withTime = true) {
            const date = new Date(dateString);
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            if (withTime) { options.hour = '2-digit';
                options.minute = '2-digit'; }
            return date.toLocaleDateString('id-ID', options);
        }

        function getCurrentDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function validateNIM(nim) { return /^[0-9]{12}$/.test(nim); }

        function validatePhone(phone) { return /^08[0-9]{8,11}$/.test(phone); }

        function loadState() {
            try {
                const saved = localStorage.getItem('trisya_bayar_state');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    AppState = { ...AppState, ...parsed };
                }
                const transactions = localStorage.getItem('trisya_bayar_transactions');
                if (transactions) {
                    AppState.transactions = JSON.parse(transactions);
                } else {
                    AppState.transactions = [...initialTransactions];
                    saveTransactions();
                }
                if (!AppState.user) { AppState.user = { ...userData }; }
                if (AppState.settings.darkMode) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').querySelector('i').className = 'fas fa-sun';
                }
            } catch (e) {
                console.error('Error loading state:', e);
                AppState.user = { ...userData };
                AppState.transactions = [...initialTransactions];
                AppState.settings = { darkMode: false, currentSection: 'dashboard' };
            }
        }

        function saveState() {
            try {
                const stateToSave = {
                    user: AppState.user,
                    settings: AppState.settings,
                    currentSection: AppState.settings.currentSection
                };
                localStorage.setItem('trisya_bayar_state', JSON.stringify(stateToSave));
            } catch (e) { console.error('Error saving state:', e); }
        }

        function saveTransactions() {
            try {

        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const iconMap = {
                success: 'fa-circle-check',
                error: 'fa-circle-xmark',
                warning: 'fa-triangle-exclamation',
                info: 'fa-circle-info'
            };
            const icon = iconMap[type] || iconMap.info;
            const toast = document.createElement('div');
            toast.className = `toast-custom ${type}`;
            toast.innerHTML = `
                <span class="toast-icon"><i class="fas ${icon}"></i></span>
                <span class="toast-message">${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

                    <div class="card-title">${categoryName}</div>
                    <form id="tagihanForm" onsubmit="cekTagihan(event, '${category}')">
                        <div class="mb-2">
                            <label class="form-label">${label}</label>
                            <input type="text" class="form-control" id="tagihanInput" placeholder="${placeholder}" required style="font-size:0.95rem;padding:10px 12px" />
                            <small style="color:var(--text-muted);font-size:0.65rem">${helpText}</small>
                            <div class="invalid-feedback" id="tagihanError"></div>
                        </div>
                        <button type="submit" class="btn-primary-custom"><i class="fas fa-search"></i> Cek Tagihan</button>
                    </form>
                </div>
            `;
        }

        function cekTagihan(event, category) {
            event.preventDefault();
            const input = document.getElementById('tagihanInput');
            const errorEl = document.getElementById('tagihanError');
            const value = input.value.trim();

            let valid = true;
            let errorMsg = '';
            if (!value) { valid = false;
                errorMsg = 'Harap masukkan nomor pelanggan'; } else if (category === 'seminar') {
                if (!validateSeminar(value)) { valid = false;
                    errorMsg = 'Format ID Seminar tidak valid (contoh: SEM-2026-001)'; }
            } else {
                if (!validatePelanggan(value)) { valid = false;
                    errorMsg = 'Nomor pelanggan harus 8-12 digit angka'; }
            }

            if (!valid) { input.classList.add('is-invalid');
                errorEl.textContent = errorMsg; return; }
            input.classList.remove('is-invalid');
            errorEl.textContent = '';

            showLoading('Mencari tagihan...');
            setTimeout(() => {
                hideLoading();
                let data = null;
                let categoryDisplay = '';
                switch (category) {
                    case 'pln':
                        data = plnData[value];
                        categoryDisplay = 'PLN (Listrik)';
                        break;
                    case 'pdam':
                        data = pdamData[value];
                        categoryDisplay = 'PDAM (Air)';
                        break;
                    case 'internet':
                        data = internetData[value];
                        categoryDisplay = 'Internet';
                        break;
                    case 'seminar':
                        data = seminarData[value];
                        categoryDisplay = 'Seminar/Event';
                        break;
                }

                const resultContainer = document.getElementById('tagihanResultContainer');
                if (data) {
                    if (isBillPaid(data)) {
                        showToast('Tagihan ini sudah lunas', 'warning');
                        resultContainer.innerHTML = `
                            <div class="card-modern" style="border-left:4px solid var(--warning);margin-top:12px">
                                <p style="color:var(--text-secondary);font-size:0.85rem">⚠️ Tagihan ini sudah <strong>LUNAS</strong></p>
                                <p style="font-size:0.75rem;color:var(--text-muted)">Tidak dapat melakukan pembayaran ulang.</p>
                            </div>
                        `;
                        return;
                    }
                    AppState.currentBill = { ...data, category, categoryDisplay };
                    showTagihanResult(resultContainer, data, category, categoryDisplay);
                } else {
                    showToast('Nomor pelanggan tidak ditemukan', 'error');
                    resultContainer.innerHTML = `
                        <div class="card-modern" style="border-left:4px solid var(--danger);margin-top:12px">
                            <p style="color:var(--text-secondary);font-size:0.85rem">❌ Tagihan tidak ditemukan</p>
                            <p style="font-size:0.75rem;color:var(--text-muted)">Silakan cek kembali nomor pelanggan Anda.</p>
                        </div>
                    `;
                }
            }, 1000);
        }

        function showTagihanResult(container, data, category, categoryDisplay) {
            container.innerHTML = `
                <div class="card-modern" style="margin-top:12px;border:2px solid var(--primary-light)">
                    <h6 style="font-weight:700;color:var(--primary);margin-bottom:12px;font-size:0.9rem"><i class="fas fa-check-circle"></i> Detail Tagihan</h6>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:0.75rem">
                        <div><strong>Kategori</strong></div><div>${categoryDisplay}</div>
                        <div><strong>Nama Pelanggan</strong></div><div>${data.name}</div>
                        <div><strong>Alamat</strong></div><div style="font-size:0.7rem">${truncateText(data.address, 20)}</div>
                        <div><strong>Periode</strong></div><div>${data.period || '-'}</div>
                        <div><strong>Tagihan Pokok</strong></div><div>${formatRupiah(data.amount)}</div>

        function selectPayment(methodId) {
            document.querySelectorAll('.payment-item').forEach(el => {
                el.classList.toggle('selected', el.id === `payment-${methodId}`);

                    `;

                    detailHTML += `

                    `;

        function prosesBayarTagihan() {
            const bill = AppState.currentBill;
            const method = AppState.currentPayment;
            if (!bill) { showToast('Silakan cek tagihan terlebih dahulu', 'warning'); return; }
            if (!method) { showToast('Silakan pilih metode pembayaran', 'warning'); return; }
            if (!hasEnoughBalance(bill.total)) { showToast(`Saldo tidak mencukupi. Butuh ${formatRupiah(bill.total)}`, 'error'); return; }

            const methodName = paymentMethods.find(m => m.id === method)?.name || method;
            showModal('Konfirmasi Pembayaran', `
                <p style="font-size:0.85rem">Anda yakin ingin membayar tagihan berikut?</p>
                <div style="background:var(--bg-primary);padding:12px;border-radius:var(--radius-md);margin:6px 0;font-size:0.85rem">
                    <p><strong>${bill.name}</strong></p>
                    <p style="font-size:0.75rem;color:var(--text-secondary)">${bill.address}</p>
                    <p style="font-size:1.1rem;font-weight:700;color:var(--primary)">${formatRupiah(bill.total)}</p>
                    <p style="font-size:0.7rem;color:var(--text-muted)">Metode: ${methodName}</p>
                </div>
            `, `
                <button class="btn-secondary-custom" onclick="closeModal()" style="min-height:44px;font-size:0.85rem">Batal</button>
                <button class="btn-primary-custom" onclick="executeTagihanPayment()" style="min-height:44px;font-size:0.85rem">Ya, Bayar</button>
            `);
        }

        function executeTagihanPayment() {
            closeModal();
            const bill = AppState.currentBill;
            const method = AppState.currentPayment;
            const methodName = paymentMethods.find(m => m.id === method)?.name || method;

            showLoading('Memproses pembayaran...');
            setTimeout(() => {
                hideLoading();
                AppState.user.saldo -= bill.total;
                const transaction = {
                    id: generateTransactionId(),
                    type: `Tagihan ${bill.categoryDisplay}`,
                    category: bill.categoryDisplay,
                    description: `Pembayaran ${bill.categoryDisplay} - ${bill.name}`,
                    amount: bill.total,
                    status: 'Sukses',
                    date: getCurrentDate(),
                    method: methodName,
                    reference: generateTransactionId()
                };
                AppState.transactions.push(transaction);
                saveTransactions();
                saveState();
                bill.status = 'Lunas';
                showBuktiPembayaran(transaction, bill);
                updateSaldo();
                showToast('Pembayaran berhasil! 🎉', 'success');
            }, 1500);
        }

        function prosesBayarSPP() {
            const selected = AppState.selectedSPP;
            const method = AppState.currentPayment;
            const data = AppState.currentBill;

            if (!selected || selected.length === 0) { showToast('Pilih minimal satu tagihan', 'warning'); return; }
            if (!method) { showToast('Silakan pilih metode pembayaran', 'warning'); return; }

            let total = 0;
            const tagihan = data.tagihan || [];
            const selectedItems = [];
            tagihan.forEach(item => {
                if (selected.includes(item.id)) { total += item.amount;
                    selectedItems.push(item); }
            });
            if (total === 0) { showToast('Tidak ada tagihan yang valid', 'warning'); return; }
            if (!hasEnoughBalance(total)) { showToast(`Saldo tidak mencukupi. Butuh ${formatRupiah(total)}`, 'error'); return; }

            const methodName = paymentMethods.find(m => m.id === method)?.name || method;
            showModal('Konfirmasi Pembayaran SPP', `
                <p style="font-size:0.85rem">Anda yakin ingin membayar <strong>${selectedItems.length}</strong> tagihan SPP?</p>
                <div style="background:var(--bg-primary);padding:12px;border-radius:var(--radius-md);margin:6px 0;font-size:0.8rem">
                    ${selectedItems.map(item => `

                        <span>Total</span>
                        <span>${formatRupiah(total)}</span>
                    </div>
                    <p style="font-size:0.7rem;color:var(--text-muted);margin-top:6px">Metode: ${methodName}</p>
                </div>
            `, `
                <button class="btn-secondary-custom" onclick="closeModal()" style="min-height:44px;font-size:0.85rem">Batal</button>
                <button class="btn-primary-custom" onclick="executeSPPPayment()" style="min-height:44px;font-size:0.85rem">Ya, Bayar</button>
            `);
        }

        function executeSPPPayment() {
            closeModal();
            const selected = AppState.selectedSPP;
            const method = AppState.currentPayment;
            const data = AppState.currentBill;
            const methodName = paymentMethods.find(m => m.id === method)?.name || method;

            let total = 0;
            const tagihan = data.tagihan || [];
            const selectedItems = [];
            tagihan.forEach(item => {
                if (selected.includes(item.id)) { total += item.amount;
                    selectedItems.push(item); }
            });

            showLoading('Memproses pembayaran SPP...');
            setTimeout(() => {
                hideLoading();
                AppState.user.saldo -= total;
                selectedItems.forEach(item => { item.status = 'Lunas';
                    item.paidDate = getCurrentDate(); });
                const transaction = {
                    id: generateTransactionId(),
                    type: 'SPP',
                    category: 'Pendidikan',
                    description: `Pembayaran SPP - ${data.name} (${selectedItems.length} tagihan)`,
                    amount: total,
                    status: 'Sukses',
                    date: getCurrentDate(),
                    method: methodName,
                    reference: generateTransactionId()
                };
                AppState.transactions.push(transaction);
                saveTransactions();
                saveState();
                showBuktiPembayaran(transaction, data);
                updateSaldo();
                showToast('Pembayaran SPP berhasil! 🎉', 'success');
            }, 1500);
        }

                        <div>
                            <label class="form-label">Atau Pilih Paket Data</label>
                            <select class="form-control" id="paketSelect" onchange="selectPaket(this.value)" style="font-size:0.95rem;padding:10px 12px">
                                <option value="">-- Pilih Paket Data --</option>
                                ${paketData.map(p => `<option value="${p.id}">${p.name} - ${formatRupiah(p.price)} (${p.provider})</option>`).join('')}
                            </select>
                        </div>
                        <div id="pulsaPreview" style="display:none;margin-top:12px;padding:12px;background:var(--bg-primary);border-radius:var(--radius-md);font-size:0.8rem"></div>
                        <div>
                            <label class="form-label">Pilih Metode Pembayaran</label>
                            <div class="payment-grid">
                                ${paymentMethods.map(m => `
                                    <div class="payment-item" onclick="selectPaymentPulsa('${m.id}')" id="payment-pulsa-${m.id}">
                                        <span class="payment-icon"><i class="${m.icon}"></i></span>
                                        <span class="payment-name">${m.name}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div id="pulsaPaymentDetail"></div>
                        </div>
                        <button class="btn-primary-custom mt-sm" onclick="prosesBayarPulsa()" id="bayarPulsaBtn"><i class="fas fa-credit-card"></i> Bayar Sekarang</button>
                    </div>
                </div>
            `;
        }

        function selectProvider(providerId) {
            document.querySelectorAll('.provider-item').forEach(el => {
                el.classList.toggle('selected', el.id === `provider-${providerId}`);
            });
            AppState.selectedProvider = providerId;
            document.getElementById('pulsaFormContainer').style.display = 'block';
            AppState.selectedNominal = null;
            document.querySelectorAll('.nominal-item').forEach(el => el.classList.remove('selected'));
            document.getElementById('paketSelect').value = '';
            document.getElementById('pulsaPreview').style.display = 'none';
        }

        function selectNominal(value) {
            document.querySelectorAll('.nominal-item').forEach(el => {
                el.classList.toggle('selected', el.id === `nominal-${value}`);
            });
            AppState.selectedNominal = value;
            AppState.selectedPaket = null;
            document.getElementById('paketSelect').value = '';
            updatePulsaPreview();
        }

        function selectPaket(paketId) {
            if (!paketId) { AppState.selectedPaket = null;
                updatePulsaPreview(); return; }
            const paket = paketData.find(p => p.id === paketId);
            if (paket) {
                AppState.selectedPaket = paket;
                AppState.selectedNominal = null;
                document.querySelectorAll('.nominal-item').forEach(el => el.classList.remove('selected'));
                updatePulsaPreview();
            }
        }

        function updatePulsaPreview() {
            const preview = document.getElementById('pulsaPreview');
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) { preview.style.display = 'none'; return; }

            const provider = getProviderByPhone(phone);
            if (!provider) {
                preview.innerHTML =
                `<p style="color:var(--danger);font-size:0.75rem">❌ Nomor HP tidak valid atau provider tidak terdeteksi</p>`;
                preview.style.display = 'block';
                return;
            }

            let nominal = AppState.selectedNominal;
            let paket = AppState.selectedPaket;
            let price = 0;
            let label = '';

            if (nominal) {
                const n = pulsaNominal.find(p => p.value === nominal);
                if (n) { price = n.price;
                    label = n.label; }
            } else if (paket) {
                price = paket.price;
                label = `${paket.name} (${paket.provider})`;
            } else {
                preview.innerHTML =
                `<p style="color:var(--text-muted);font-size:0.75rem">Silakan pilih nominal pulsa atau paket data</p>`;
                preview.style.display = 'block';
                return;
            }

            preview.innerHTML = `
                <p style="font-weight:600;font-size:0.8rem">📋 Ringkasan</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:0.75rem">
                    <span>Provider</span><span><strong>${provider.name}</strong></span>
                    <span>Nomor Tujuan</span><span><strong>${phone}</strong></span>
                    <span>Produk</span><span><strong>${label}</strong></span>
                    <span style="font-size:0.95rem;font-weight:700;color:var(--primary)">Total</span>
                    <span style="font-size:0.95rem;font-weight:700;color:var(--primary)">${formatRupiah(price)}</span>
                </div>
            `;
            preview.style.display = 'block';
        }

        function selectPaymentPulsa(methodId) {
            document.querySelectorAll('.payment-item').forEach(el => {
                el.classList.toggle('selected', el.id === `payment-pulsa-${methodId}`);
            });
            AppState.currentPayment = methodId;
            const detailContainer = document.getElementById('pulsaPaymentDetail');
            const method = paymentMethods.find(m => m.id === methodId);
            if (method) {
                let detailHTML =
                `<div style="margin-top:6px;padding:10px;background:var(--bg-primary);border-radius:var(--radius-md);font-size:0.8rem">`;
                if (methodId === 'va') {
                    const bank = method.banks[Math.floor(Math.random() * method.banks.length)];
                    const va = generateVA(bank);
                    detailHTML += `
                        <p style="font-weight:600;font-size:0.8rem">🏦 Virtual Account</p>
                        <p style="font-size:0.8rem">Bank: <strong>${bank}</strong></p>
                        <p style="font-size:0.8rem">Nomor VA: <strong style="color:var(--primary);font-size:0.9rem">${va}</strong></p>
                    `;
                } else if (methodId === 'qris') {
                    const qrData = generateQRData(`PULSA-${Date.now()}`);
                    detailHTML += `
                        <p style="font-weight:600;font-size:0.8rem">📱 QRIS</p>
                        <div id="qrcodePulsaContainer" style="display:flex;justify-content:center;padding:4px"></div>
                    `;
                    setTimeout(() => {
                        const container = document.getElementById('qrcodePulsaContainer');
                        if (container && typeof QRCode !== 'undefined') {
                            container.innerHTML = '';
                            new QRCode(container, { text: qrData, width: 140, height: 140, colorDark: '#0D7C66',
                                colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.H });
                        }
                    }, 100);
                } else if (methodId === 'teller') {
                    const code = generatePaymentCode();
                    detailHTML += `
                        <p style="font-weight:600;font-size:0.8rem">🏪 Teller / Kasir</p>
                        <p style="font-size:0.8rem">Kode Pembayaran: <strong style="color:var(--primary);font-size:0.9rem">${code}</strong></p>
                    `;
                }
                detailHTML += `</div>`;
                detailContainer.innerHTML = detailHTML;
            }
        }

        function prosesBayarPulsa() {
            const phone = document.getElementById('phoneInput').value.trim();
            const providerId = AppState.selectedProvider;
            const nominal = AppState.selectedNominal;
            const paket = AppState.selectedPaket;
            const method = AppState.currentPayment;

            if (!providerId) { showToast('Pilih provider terlebih dahulu', 'warning'); return; }
            if (!phone) { showToast('Masukkan nomor HP', 'warning'); return; }
            if (!validatePhone(phone)) { showToast('Nomor HP tidak valid (10-13 digit, awalan 08)', 'error'); return; }
            const provider = getProviderByPhone(phone);
            if (!provider || provider.id !== providerId) {
                showToast(`Provider tidak sesuai. Gunakan ${providerData.find(p => p.id === providerId)?.name || ''}`, 'error');
                return;
            }
            if (!nominal && !paket) { showToast('Pilih nominal pulsa atau paket data', 'warning'); return; }
            if (!method) { showToast('Pilih metode pembayaran', 'warning'); return; }

            let price = 0,
                label = '';
            if (nominal) { const n = pulsaNominal.find(p => p.value === nominal); if (n) { price = n.price;
                    label = n.label; } } else if (paket) { price = paket.price;
                label = `${paket.name} (${paket.provider})`; }
            if (price === 0) { showToast('Terjadi kesalahan, silakan coba lagi', 'error'); return; }
            if (!hasEnoughBalance(price)) { showToast(`Saldo tidak mencukupi. Butuh ${formatRupiah(price)}`, 'error'); return; }

            const methodName = paymentMethods.find(m => m.id === method)?.name || method;
            showModal('Konfirmasi Pembelian Pulsa', `
                <p style="font-size:0.85rem">Anda yakin ingin membeli pulsa berikut?</p>
                <div style="background:var(--bg-primary);padding:12px;border-radius:var(--radius-md);margin:6px 0;font-size:0.85rem">
                    <p><strong>${provider.name}</strong></p>
                    <p style="font-size:0.75rem;color:var(--text-secondary)">Nomor: ${phone}</p>
                    <p style="font-size:0.75rem;color:var(--text-secondary)">Produk: ${label}</p>
                    <p style="font-size:1.1rem;font-weight:700;color:var(--primary)">${formatRupiah(price)}</p>
                    <p style="font-size:0.7rem;color:var(--text-muted)">Metode: ${methodName}</p>
                </div>
            `, `
                <button class="btn-secondary-custom" onclick="closeModal()" style="min-height:44px;font-size:0.85rem">Batal</button>
                <button class="btn-primary-custom" onclick="executePulsaPayment()" style="min-height:44px;font-size:0.85rem">Ya, Bayar</button>
            `);
        }

        function executePulsaPayment() {
            closeModal();
            const phone = document.getElementById('phoneInput').value.trim();
            const providerId = AppState.selectedProvider;
            const nominal = AppState.selectedNominal;
            const paket = AppState.selectedPaket;
            const method = AppState.currentPayment;
            const methodName = paymentMethods.find(m => m.id === method)?.name || method;

            let price = 0,
                label = '',
                productType = 'Pulsa';
            if (nominal) { const n = pulsaNominal.find(p => p.value === nominal); if (n) { price = n.price;
                    label = n.label; } } else if (paket) { price = paket.price;
                label = `${paket.name} (${paket.provider})`;
                productType = 'Paket Data'; }
            const provider = providerData.find(p => p.id === providerId);

            showLoading(`Memproses pembelian ${productType}...`);
            setTimeout(() => {
                hideLoading();
                AppState.user.saldo -= price;
                const transaction = {
                    id: generateTransactionId(),
                    type: productType,
                    category: 'Pulsa',
                    description: `${productType} ${provider?.name || ''} - ${phone} (${label})`,
                    amount: price,
                    status: 'Sukses',
                    date: getCurrentDate(),
                    method: methodName,
                    reference: generateTransactionId()
                };
                AppState.transactions.push(transaction);
                saveTransactions();
                saveState();
                showBuktiPembayaran(transaction, { name: `${provider?.name || ''} - ${phone}`, total: price });
                updateSaldo();
                showToast(`Pembelian ${productType} berhasil! 🎉`, 'success');
            }, 1500);
        }

        // ============================================================
        // 14. RIWAYAT
        // ============================================================

        function renderRiwayat(container) {
            const transactions = AppState.transactions || [];

            container.innerHTML = `
                <h5 style="font-weight:700;margin-bottom:12px;font-size:1rem">📜 Riwayat Transaksi</h5>
                <div class="card-modern">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
                        <div style="display:flex;align-items:center;gap:6px">
                            <label class="form-label" style="margin-bottom:0;font-size:0.7rem">Filter</label>
                            <select class="form-control" style="width:auto;display:inline-block;padding:4px 8px;font-size:0.7rem;min-height:32px" id="filterStatus" onchange="filterRiwayat()">
                                <option value="all">Semua</option>
                                <option value="sukses">Sukses</option>
                                <option value="gagal">Gagal</option>
                            </select>
                        </div>
                        <div style="display:flex;align-items:center;gap:6px">
                            <span style="font-size:0.7rem;color:var(--text-muted)">${transactions.length} transaksi</span>
                            ${transactions.length > 0 ? `
                                <button class="btn-danger-custom" style="width:auto;padding:4px 10px;font-size:0.65rem;min-height:32px" onclick="clearHistory()"><i class="fas fa-trash"></i></button>
                            ` : ''}
                        </div>
                    </div>
                </div>
                <div id="riwayatList" class="card-modern" style="padding:10px">
                    ${transactions.length > 0 ? `
                        <div style="overflow-x:auto;margin:-4px">
                            <table class="table-modern">
                                <thead><tr><th>#</th><th>Tanggal</th><th>Deskripsi</th><th>Jumlah</th><th>Status</th></tr></thead>
                                <tbody id="riwayatBody">
                                    ${transactions.slice().reverse().map((t, index) => `
                                        <tr>
                                            <td>${index + 1}</td>
                                            <td style="font-size:0.6rem">${formatDate(t.date, true)}</td>
                                            <td style="font-size:0.65rem;max-width:80px;word-break:break-word">${truncateText(t.description, 16)}</td>
                                            <td style="font-weight:600;font-size:0.7rem">${formatRupiah(t.amount)}</td>
                                            <td><span class="status-badge ${t.status.toLowerCase()}">${t.status}</span></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : `
                        <p style="text-align:center;color:var(--text-muted);padding:20px 0;font-size:0.85rem">
                            <i class="fas fa-inbox" style="font-size:1.3rem;display:block;margin-bottom:8px"></i>Belum ada transaksi
                        </p>
                    `}
                </div>
                ${transactions.length > 0 ? `
                    <div class="card-modern" style="margin-top:12px">
                        <div class="card-title">📊 Statistik Pengeluaran</div>
                        <canvas id="expenseChart" style="max-height:180px;width:100%"></canvas>
                    </div>
                ` : ''}
            `;

            if (transactions.length > 0) {
                setTimeout(() => renderChart(transactions), 100);
            }
        }

        function filterRiwayat() {
            const filter = document.getElementById('filterStatus').value;
            const rows = document.querySelectorAll('#riwayatBody tr');
            rows.forEach(row => {
                const status = row.querySelector('.status-badge')?.textContent?.toLowerCase() || '';
                row.style.display = (filter === 'all' || status === filter) ? '' : 'none';
            });
        }

        function clearHistory() {
            if (AppState.transactions.length === 0) return;
            showModal('Hapus Riwayat', `
                <p style="font-size:0.85rem">Anda yakin ingin menghapus semua riwayat transaksi?</p>
                <p style="font-size:0.75rem;color:var(--text-muted)">Tindakan ini tidak dapat dibatalkan.</p>
            `, `
                <button class="btn-secondary-custom" onclick="closeModal()" style="min-height:44px;font-size:0.85rem">Batal</button>
                <button class="btn-danger-custom" onclick="executeClearHistory()" style="min-height:44px;font-size:0.85rem">Ya, Hapus Semua</button>
            `);
        }

        function executeClearHistory() {
            closeModal();
            AppState.transactions = [];
            saveTransactions();
            renderRiwayat(document.getElementById('contentContainer'));
            showToast('Riwayat berhasil dihapus', 'info');
        }

        function renderChart(transactions) {
            const canvas = document.getElementById('expenseChart');
            if (!canvas || typeof Chart === 'undefined') return;

            const monthlyData = {};
            transactions.forEach(t => {
                const date = new Date(t.date);
                const month = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                if (!monthlyData[month]) monthlyData[month] = 0;
                monthlyData[month] += t.amount;
            });

            const sortedMonths = Object.keys(monthlyData).sort();
            const labels = sortedMonths.map(m => {
                const [year, month] = m.split('-');
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                return `${monthNames[parseInt(month) - 1]} ${year}`;
            });
            const data = sortedMonths.map(m => monthlyData[m]);

            new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Pengeluaran',
                        data: data,
                        backgroundColor: 'rgba(13, 124, 102, 0.6)',
                        borderColor: '#0D7C66',
                        borderWidth: 2,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: getComputedStyle(document.documentElement).getPropertyValue(
                                    '--text-secondary') || '#4A5A6A',
                                font: { size: 9 }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) { return formatRupiah(value); },
                                color: getComputedStyle(document.documentElement).getPropertyValue(
                                    '--text-muted') || '#8A9AAA',
                                font: { size: 8 }
                            },
                            grid: { color: 'rgba(13, 124, 102, 0.06)' }
                        },
                        x: {
                            ticks: {
                                color: getComputedStyle(document.documentElement).getPropertyValue(
                                    '--text-muted') || '#8A9AAA',
                                font: { size: 8 }
                            },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // ============================================================
        // 15. BUKTI PEMBAYARAN
        // ============================================================

        function showBuktiPembayaran(transaction, bill) {
            const method = transaction.method || 'Virtual Account';
            const date = formatDate(transaction.date, true);

            showModal('✅ Bukti Pembayaran', `
                <div id="strukContent" style="font-size:0.8rem">
                    <div style="text-align:center;margin-bottom:12px">
                        <h4 style="font-weight:800;color:var(--primary);font-size:1rem">💳 Trisya_Bayar</h4>
                        <p style="font-size:0.65rem;color:var(--text-muted)">──────────────────</p>
                        <p style="font-weight:600;font-size:0.75rem">BUKTI TRANSAKSI</p>
                        <p style="font-size:0.6rem;color:var(--text-muted)">${transaction.id}</p>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:0.75rem">
                        <span style="color:var(--text-muted)">Tanggal</span>
                        <span style="font-weight:500">${date}</span>
                        <span style="color:var(--text-muted)">Deskripsi</span>
                        <span style="font-weight:500">${transaction.description}</span>
                        <span style="color:var(--text-muted)">Metode</span>
                        <span style="font-weight:500">${method}</span>
                        <span style="color:var(--text-muted)">Referensi</span>
                        <span style="font-weight:500">${transaction.reference || '-'}</span>
                    </div>
                    <div style="text-align:center;margin:12px 0;padding:12px;background:var(--bg-primary);border-radius:var(--radius-md)">
                        <span style="font-size:0.65rem;color:var(--text-muted)">Total Pembayaran</span>
                        <div style="font-size:1.4rem;font-weight:800;color:var(--primary)">${formatRupiah(transaction.amount)}</div>
                    </div>
                    <div style="text-align:center;font-size:0.6rem;color:var(--text-muted)">
                        <p>──────────────────</p>
                        <p>Terima kasih telah menggunakan Trisya_Bayar</p>
                        <p>Status: <span style="color:var(--success);font-weight:600">✓ LUNAS</span></p>
                    </div>
                </div>
            `, `
                <button class="btn-secondary-custom" onclick="window.print()" style="min-height:44px;font-size:0.8rem"><i class="fas fa-print"></i> Print Struk</button>
                <button class="btn-primary-custom" onclick="closeModal();navigateTo('riwayat')" style="min-height:44px;font-size:0.8rem"><i class="fas fa-check"></i> Selesai</button>
            `);
        }

        // ============================================================
        // 16. UPDATE SALDO
        // ============================================================

        function updateSaldo() {
            const saldoEl = document.getElementById('saldoDisplay');
            if (saldoEl) { saldoEl.textContent = formatRupiah(AppState.user.saldo); }
        }

        // ============================================================
        // 17. THEME TOGGLE
        // ============================================================

        function initThemeToggle() {
            document.getElementById('themeToggle').addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    document.getElementById('themeToggle').querySelector('i').className = 'fas fa-moon';
                    AppState.settings.darkMode = false;
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').querySelector('i').className = 'fas fa-sun';
                    AppState.settings.darkMode = true;
                }
                saveState();
            });
        }

        // ============================================================
        // 18. NAVIGATION INIT
        // ============================================================

        function initNavigation() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    navigateTo(item.dataset.section);
                });
            });
            const savedSection = AppState.settings.currentSection || 'dashboard';
            navigateTo(savedSection);
        }

        // ============================================================
        // 19. PROFILE
        // ============================================================

        function initProfile() {
            document.getElementById('profileBtn').addEventListener('click', () => {
                const user = AppState.user;
                showModal('👤 Profil Saya', `
                    <div style="text-align:center;margin-bottom:12px">
                        <img src="${user.profileImage}" alt="Profile" style="width:64px;height:64px;border-radius:50%;border:3px solid var(--primary)" />
                        <h5 style="margin-top:4px;font-weight:700;font-size:0.95rem">${user.name}</h5>
                        <p style="font-size:0.75rem;color:var(--text-muted)">${user.major}</p>
                        <p style="font-size:0.75rem;color:var(--text-muted)">NIM: ${user.nim}</p>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:0.75rem;padding:8px;background:var(--bg-primary);border-radius:var(--radius-md)">
                        <span style="color:var(--text-muted)">Email</span>
                        <span>${user.email}</span>
                        <span style="color:var(--text-muted)">Semester</span>
                        <span>${user.semester}</span>
                        <span style="color:var(--text-muted)">Saldo</span>
                        <span style="font-weight:700;color:var(--primary)">${formatRupiah(user.saldo)}</span>
                    </div>
                `, `
                    <button class="btn-primary-custom" onclick="closeModal()" style="min-height:44px;font-size:0.85rem">Tutup</button>
                `);
            });
        }

        // ============================================================
        // 20. INITIALIZATION
        // ============================================================

        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            updateSaldo();
            initThemeToggle();
            initNavigation();
            initProfile();

            document.addEventListener('input', function(e) {
                if (e.target.id === 'phoneInput') {
                    updatePulsaPreview();
                }
            });

            console.log('💳 Trisya_Bayar initialized successfully! (Mobile-First)');
            console.log(`👋 Welcome, ${AppState.user.name}`);
            console.log(`💰 Saldo: ${formatRupiah(AppState.user.saldo)}`);
            console.log(`📊 Total transactions: ${AppState.transactions.length}`);
        });
    </script>
</body>
</html>
